alert:
  bigger_is_better: true
  threshold: 125%
chart:
  description: >
    ycsb run redis -p redis.host=<guest_ip> -p redis.port=6379 -P ./workloads/workloada
    -p operationcount=4096 -p recordcount=4096
    -p workload=site.ycsb.workloads.CoreWorkload
    -p readproportion=0.05 -p updateproportion=0.00 -p scanproportion=0.00
    -p insertproportion=0.00 -p readmodifywriteproportion=0.00 -p deleteproportion=0.95
    -p threadcount=16 -p fieldcount=1 -p fieldlength=4096 -p minfieldlength=4096
    -p fieldlengthdistribution=uniform
    (run 4096 times; result taken from final iteration)
  legend: Throughput (ops/sec) of YCSB Redis (delete-heavy, 4096-byte fields) on Guest {system}
  title: YCSB Redis throughput under allocator stress (virtio-net, 16 threads, 4096-byte fields)
  unit: operations per second
result_extraction:
  result_index: 3
  # Must match the loop count in host.sh (for _ in $(seq 1 <nth_occurrence>))
  nth_occurrence: 4096
  search_pattern: '\[OVERALL\], Throughput\(ops'
