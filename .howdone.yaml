prefix: run
output_file: output.txt
output_dir:
  var: OUTPUT_DIR
commands:
  hostname: hostname
  git_state.txt: git status; git log -n 3
  dirty.diff: git diff --stat --patch HEAD
  ps-ax.txt:
    command: ps ax
    when: before
  lsblk.txt: lsblk
  mount.txt: mount
  uname-all.txt: uname --all
  lscpu.txt: lscpu
  env.txt: env
  qemu.log: cat qemu.log
  qemu-enhanced.log: cargo osdk enhance-log -b target/osdk/aster-kernel/aster-kernel-osdk-bin qemu.log
  results: cp -a results_*.json $OUTPUT_DIR; echo Results are in; ls -lh $OUTPUT_DIR/results_*.json
